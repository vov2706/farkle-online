name: deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.SERVER_PATH }}
            git pull
            
            cd ${{ secrets.SERVER_PATH }}/client
            yarn
            yarn build

            cd ${{ secrets.SERVER_PATH }}/server
            go build -o farkle-online

            sudo systemctl restart farkle-online